{% extends 'base.html' %}
{% block title %}Set New Password — TaskMaster{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦ TaskMaster</div>
  <h2 class="auth-heading">Set new password</h2>
  <form method="post" class="auth-form">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
    </div>
    {% endfor %}
    <button type="submit" class="btn-auth">Set Password</button>
  </form>
</div>
{% endblock %}
