{% extends 'base.html' %}
{% block title %}Login — TaskMaster{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦ TaskMaster</div>
  <h2 class="auth-heading">Welcome back</h2>
  <p class="auth-sub">Sign in to your workspace</p>

  <form method="post" class="auth-form">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Username</label>
      {{ form.username }}
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      {{ form.password }}
    </div>
    <button type="submit" class="btn-auth">Sign In</button>
  </form>

  <div class="auth-links">
    <a href="/users/password-reset/">Forgot password?</a>
    <span>·</span>
    <a href="/users/register/">Create account</a>
  </div>
</div>
{% endblock %}
