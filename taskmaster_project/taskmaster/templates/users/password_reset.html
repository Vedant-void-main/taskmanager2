{% extends 'base.html' %}
{% block title %}Reset Password — TaskMaster{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">✦ TaskMaster</div>
  <h2 class="auth-heading">Reset password</h2>
  <p class="auth-sub">Enter your email to receive reset instructions</p>
  <form method="post" class="auth-form">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Email address</label>
      {{ form.email }}
    </div>
    <button type="submit" class="btn-auth">Send Reset Link</button>
  </form>
  <div class="auth-links"><a href="/users/login/">← Back to login</a></div>
</div>
{% endblock %}
